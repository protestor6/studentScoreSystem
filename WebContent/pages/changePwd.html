<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>修改密码</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", sans-serif;
}

body {
    background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    background: #fff;
    width: 420px;
    padding: 40px 35px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.login-title {
    text-align: center;
    font-size: 24px;
    color: #333;
    margin-bottom: 30px;
    font-weight: 500;
}

.form-item {
    margin-bottom: 20px;
}

.form-item label {
    display: block;
    font-size: 14px;
    color: #555;
    margin-bottom: 8px;
}

.form-item input {
    width: 100%;
    height: 42px;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 0 12px;
    font-size: 15px;
    outline: none;
    transition: border 0.3s;
}

.form-item input:focus {
    border-color: #4e73df;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 25px;
}

.btn {
    flex: 1;
    height: 45px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
}

.btn-confirm {
    background: #4e73df;
    color: #fff;
}

.btn-confirm:hover {
    background: #224abe;
}

.btn-back {
    background: #f0f0f0;
    color: #333;
}

.btn-back:hover {
    background: #e0e0e0;
}

.tip {
    color: #e74a3b;
    font-size: 14px;
    text-align: center;
    margin-bottom: 15px;
    min-height: 20px;
}
</style>
</head>
<body>
<div class="login-card">
    <div class="login-title">修改密码</div>

    <div id="tipMsg" class="tip"></div>

    <form action="/studentScoreSystem/changePwd" method="post" onsubmit="return checkForm()">
        <div class="form-item">
            <label>账号</label>
            <input type="text" name="uno" required>
        </div>

        <div class="form-item">
            <label>原密码</label>
            <input type="password" name="oldPwd" required>
        </div>

        <div class="form-item">
            <label>新密码</label>
            <input type="password" name="newPwd" id="newPwd" required minlength="6">
        </div>

        <div class="form-item">
            <label>确认新密码</label>
            <input type="password" name="confirmPwd" id="confirmPwd" required>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-confirm">确认修改</button>
            <button type="button" class="btn btn-back" onclick="history.back()">返回登录</button>
        </div>
    </form>
</div>

<script>
function checkForm() {
    const newPwd = document.getElementById("newPwd").value;
    const confirmPwd = document.getElementById("confirmPwd").value;
    const tip = document.getElementById("tipMsg");

    if (newPwd !== confirmPwd) {
        tip.innerText = "两次输入的新密码不一致！";
        return false;
    }
    if (newPwd.length < 6) {
        tip.innerText = "新密码长度不能少于6位！";
        return false;
    }
    return true;
}

// 读取URL参数显示后端返回的提示
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const msg = urlParams.get("msg");
    if (msg) {
        document.getElementById("tipMsg").innerText = decodeURIComponent(msg);
    }
}
</script>
</body>
</html>
